services:
  nats-server:
    image: nats:alpine
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8222/varz",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    container_name: client-gateway
    build:
      context: ./client-gateway
      dockerfile: Dockerfile
    environment:
      - PORT=${CLIENT_GATEWAY_PORT}
      - NATS_SERVERS=${NATS_SERVERS}
    depends_on:
      nats-server:
        condition: service_healthy

  products-service:
    container_name: products-service
    build:
      context: ./products-ms
      dockerfile: Dockerfile
    environment:
      - PORT=${PRODUCTS_PORT}
      - NATS_SERVERS=${NATS_SERVERS}
      - DATABASE_URL=${PRODUCTS_DATABASE_URL}
    depends_on:
      nats-server:
        condition: service_healthy

  orders-service:
    container_name: orders-service
    build:
      context: ./orders-ms
      dockerfile: Dockerfile
    environment:
      - PORT=${ORDERS_PORT}
      - NATS_SERVERS=${NATS_SERVERS}
      - DATABASE_URL=${ORDERS_DATABASE_URL}
    depends_on:
      nats-server:
        condition: service_healthy
      orders-db-service:
        condition: service_healthy

  orders-db-service:
    container_name: orders-db-service
    image: postgres:17
    volumes:
      - orders-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${ORDERS_DB_USER}
      - POSTGRES_PASSWORD=${ORDERS_DB_PASSWORD}
      - POSTGRES_DB=${ORDERS_DB_NAME}
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${ORDERS_DB_USER} -d ${ORDERS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  orders-db-data:
